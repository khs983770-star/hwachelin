name: Sync public toilets

on:
  schedule:
    # 03:00 KST every day
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PUBLIC_TOILET_REGION: ''
      PUBLIC_TOILET_LIMIT: '30000'
      PUBLIC_TOILET_IMPORT_MODE: supabase
      PUBLIC_TOILET_PRUNE_STALE: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync public toilet data
        run: npm run public-toilets:sync
