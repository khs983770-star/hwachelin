<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    #status {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7); color: white;
      padding: 8px; border-radius: 6px; font-size: 12px; z-index: 999;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">로딩 중...</div>

  <script>
    var KAKAO_KEY = '';
    var map, currentMarker;

    window.onerror = function(msg, src, line) {
      sendLog('오류: ' + msg + ' (line ' + line + ')');
    };

    function sendLog(msg) {
      document.getElementById('status').innerText = msg;
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'LOG', msg: msg }));
      }
    }

    // React Native에서 초기화 메시지 수신
    document.addEventListener('message', function(e) {
      handleMessage(e.data);
    });
    window.addEventListener('message', function(e) {
      handleMessage(e.data);
    });

    function handleMessage(data) {
      try {
        var msg = JSON.parse(data);
        if (msg.type === 'INIT') {
          KAKAO_KEY = msg.kakaoKey;
          loadKakaoSDK(msg.lat, msg.lng);
        } else if (msg.type === 'UPDATE_LOCATION') {
          updateLocation(msg.lat, msg.lng);
        }
      } catch(e) {}
    }

    function loadKakaoSDK(lat, lng) {
      sendLog('SDK 로딩 중...');
      var script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + KAKAO_KEY + '&autoload=false';
      script.onload = function() {
        sendLog('SDK 로드 완료!');
        initMap(lat, lng);
      };
      script.onerror = function() {
        sendLog('SDK 로드 실패 - 키: ' + KAKAO_KEY.substring(0, 8) + '...');
      };
      document.head.appendChild(script);
    }

    function initMap(lat, lng) {
      kakao.maps.load(function() {
        sendLog('지도 초기화 완료!');
        var container = document.getElementById('map');
        map = new kakao.maps.Map(container, {
          center: new kakao.maps.LatLng(lat, lng),
          level: 4
        });
        currentMarker = new kakao.maps.Marker({
          position: new kakao.maps.LatLng(lat, lng),
          map: map
        });
        kakao.maps.event.addListener(map, 'click', function(e) {
          var latlng = e.latLng;
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'MAP_CLICK',
            lat: latlng.getLat(),
            lng: latlng.getLng()
          }));
        });
        document.getElementById('status').style.display = 'none';
        window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'MAP_READY' }));
      });
    }

    function updateLocation(lat, lng) {
      if (!map) return;
      var pos = new kakao.maps.LatLng(lat, lng);
      map.setCenter(pos);
      if (currentMarker) currentMarker.setPosition(pos);
    }
  </script>
</body>
</html>
