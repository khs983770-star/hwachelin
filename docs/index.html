<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>화슐랭</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #FAFAFA; color: #1C1C1E; }
    .hero { background: #FF6B35; padding: 64px 24px 48px; text-align: center; color: white; }
    .hero-emoji { font-size: 56px; margin-bottom: 16px; }
    .hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .hero p { font-size: 16px; opacity: 0.88; line-height: 1.6; }
    .links { max-width: 480px; margin: 40px auto; padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }
    .link-card { display: flex; align-items: center; gap: 14px; background: white; border-radius: 14px; padding: 18px 20px; text-decoration: none; color: inherit; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: opacity 0.15s; }
    .link-card:hover { opacity: 0.8; }
    .link-icon { font-size: 24px; width: 40px; text-align: center; }
    .link-text h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .link-text p { font-size: 12px; color: #8E8E93; }
    .arrow { margin-left: auto; font-size: 20px; color: #C7C7CC; }
    .footer { text-align: center; padding: 32px 24px; font-size: 12px; color: #8E8E93; line-height: 1.8; }
  </style>
</head>

  </div>
  <div class="links">
    <a href="./privacy-policy/" class="link-card">

      <div class="link-text">

        <p>수집 항목 및 이용 목적 안내</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a href="./terms-of-service/" class="link-card">
      <span class="link-icon">📋</span>
      <div class="link-text">
        <h3>이용약관</h3>
        <p>서비스 이용 규칙</p>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
  <div class="footer">
    화슐랭 · 개발자: 김현수<br/>
    khs88189837@gmail.com<br/>

</html>
